<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Словарь физических терминов</title>
    <style>
        :root {
            --bg: #f5f7fa; --card-bg: #ffffff; --text: #1a1a2e; --text-secondary: #4a4a6a;
            --accent: #2c3e50; --accent-light: #e8ecf1; --border: #eef0f5; --hover: #f0f3f8;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
            --radius: 16px; --radius-sm: 10px; --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg); min-height: 100vh; padding: 40px 20px;
            color: var(--text); -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 36px; }
        .header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; color: var(--accent); }
        .header p { color: var(--text-secondary); margin-top: 6px; font-size: 0.9rem; }
        .grade-card {
            background: var(--card-bg); border-radius: var(--radius); overflow: hidden;
            box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 16px;
        }
        .grade-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 24px; cursor: pointer; user-select: none;
            background: var(--accent); color: #fff;
        }
        .grade-title { font-size: 1.15rem; font-weight: 650; }
        .grade-arrow { font-size: 18px; transition: transform var(--transition); }
        .grade-arrow.open { transform: rotate(90deg); }
        .grade-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
        .grade-body.show { max-height: 50000px; }
        .topic-card { border-bottom: 1px solid var(--border); }
        .topic-card:last-child { border-bottom: none; }
        .topic-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 24px 14px 36px; cursor: pointer; user-select: none;
            background: #f8fafc; transition: background var(--transition);
        }
        .topic-header:hover { background: #eef2f6; }
        .topic-title { font-size: 0.95rem; font-weight: 600; color: var(--accent); }
        .topic-arrow { font-size: 14px; color: var(--text-secondary); transition: transform var(--transition); }
        .topic-arrow.open { transform: rotate(90deg); }
        .topic-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
        .topic-body.show { max-height: 40000px; }
        .letter-item { border-bottom: 1px solid var(--border); }
        .letter-item:last-child { border-bottom: none; }
        .letter-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 24px 12px 48px; cursor: pointer; user-select: none;
            transition: background var(--transition);
        }
        .letter-header:hover { background: var(--hover); }
        .letter-title { display: flex; align-items: center; gap: 12px; }
        .letter-icon {
            font-size: 20px; font-weight: 700; color: var(--accent);
            background: var(--accent-light); width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center; border-radius: 10px;
        }
        .letter-name { font-size: 16px; font-weight: 600; color: var(--text); }
        .arrow-icon { font-size: 14px; color: var(--text-secondary); transition: transform var(--transition); }
        .arrow-icon.open { transform: rotate(90deg); }
        .terms-list {
            max-height: 0; overflow: hidden; transition: max-height 0.35s ease;
            background: #fafbfc; border-top: 1px solid transparent;
        }
        .terms-list.show { max-height: 5000px; border-top-color: var(--border); }
        .terms-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 8px; padding: 16px 24px 24px 60px;
        }
        .questions-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 8px; padding: 16px 24px 24px 36px;
        }
        .term-btn, .question-btn {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 10px 14px; font-size: 0.9rem; font-weight: 500; color: var(--text);
            cursor: pointer; transition: all var(--transition); text-align: left;
            display: flex; align-items: center; gap: 8px;
        }
        .term-btn::before { content: "▸"; font-size: 10px; color: var(--text-secondary); flex-shrink: 0; }
        .question-btn::before { content: ""; font-size: 12px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
        .term-btn:hover, .question-btn:hover {
            background: #f6f8fb; border-color: #c0c8d4; transform: translateX(2px);
        }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 30, 0.4); backdrop-filter: blur(2px);
            justify-content: center; align-items: center; z-index: 1000; padding: 20px;
        }
        .modal-content {
            background: var(--card-bg); max-width: 680px; width: 100%; border-radius: var(--radius);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12); max-height: 80vh; overflow-y: auto;
            border: 1px solid var(--border);
        }
        .modal-header {
            background: var(--card-bg); padding: 16px 22px; display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 10;
        }
        .modal-header h2 { font-size: 1.15rem; font-weight: 650; color: var(--accent); margin: 0; }
        .modal-close {
            font-size: 22px; cursor: pointer; color: var(--text-secondary); line-height: 1;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; transition: all var(--transition);
        }
        .modal-close:hover { background: var(--hover); color: var(--text); }
        .modal-body { padding: 22px; }
        .definition-text {
            background: #fafbfc; padding: 18px; border-radius: 12px; line-height: 1.65;
            color: var(--text); font-size: 0.92rem; border: 1px solid var(--border);
        }
        .footer-stats {
            text-align: center; margin-top: 30px; padding: 20px;
            font-size: 0.85rem; color: #666; border-top: 1px solid var(--border);
            background: var(--card-bg); border-radius: var(--radius);
        }
        @media (max-width: 600px) {
            body { padding: 20px 12px; }
            .header h1 { font-size: 1.6rem; }
            .terms-grid, .questions-grid { grid-template-columns: 1fr; padding: 12px 16px 20px 32px; }
            .letter-header { padding: 12px 16px 12px 32px; }
            .topic-header { padding: 12px 16px 12px 24px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Словарь физических терминов</h1>
        <p>В том числе дополнительные вопросы к билетам экзамена</p>
        <p style="font-size:0.8rem;color:#888;margin-top:2px;">Может помочь перед экзаменом (но я за это не ручаюсь)</p>
    </div>
    <div id="gradesContainer"></div>
    <div id="footerStats" class="footer-stats"></div>
</div>
<div id="termModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h2 id="modalTermName"></h2><span class="modal-close">&times;</span></div>
        <div class="modal-body"><div class="definition-text" id="modalDefinition"></div></div>
    </div>
</div>
<script>

const D = {
    "А": [
        { term: "Абсолютная влажность", definition: "Масса водяного пара в единице объёма воздуха. Измеряется в г/м³ или кг/м³ (СИ)." },
        { term: "Абсолютный показатель преломления", definition: "Отношение скорости света c в вакууме к скорости света v в данной среде: n = c/v. Характеризует оптическую плотность среды." },
        { term: "Агрегатное состояние", definition: "Состояние вещества, характеризующееся определёнными качественными свойствами. Твёрдое, жидкое, газообразное." },
        { term: "Аддитивная цветовая модель лучей", definition: "Модель цветообразования, основанная на сложении (смешении) световых лучей трёх основных цветов: красного (R), зелёного (G), синего (B). Сумма всех трёх даёт белый цвет." },
        { term: "Аккомодация", definition: "Способность глаза изменять кривизну хрусталика для получения чёткого изображения предметов, находящихся на различных расстояниях." },
        { term: "Ампер (А)", definition: "Единица измерения силы тока в СИ. 1 Ампер — это сила неизменяющегося тока, который при прохождении по двум параллельным бесконечно длинным проводникам ничтожно малого сечения, расположенным в вакууме на расстоянии 1 м друг от друга, вызывает на каждом метре длины силу взаимодействия 2·10⁻⁷ Н." },
        { term: "Амперметр", definition: "Прибор для измерения силы тока. Включается последовательно. Имеет малое внутреннее сопротивление. В основе — гальванометр с шунтом." },
        { term: "Атом", definition: "Мельчайшая, химически неделимая часть вещества. Носитель его свойств." }
    ],
    "Б": [
        { term: "Близорукость", definition: "Дефект зрения, при котором изображение удалённого предмета фокусируется перед сетчаткой. Корректируется рассеивающими линзами." }
    ],
    "В": [
        { term: "Ватт (Вт)", definition: "Единица измерения мощности в СИ. 1 Ватт — это мощность, при которой за 1 секунду совершается работа 1 Джоуль. Для электрической цепи: P = U·I." },
        { term: "ВАХ (вольт-амперная характеристика)", definition: "График зависимости силы тока I через элемент от напряжения U на нём. Для линейных элементов — прямая; для нелинейных (диод, лампа накаливания) — кривая." },
        { term: "Вектор магнитной индукции (B)", definition: "Силовая характеристика магнитного поля. Направление вектора B совпадает с направлением северного полюса магнитной стрелки. Модуль B = F_A/(I·L·sinα). Единица: Тесла (Тл)." },
        { term: "Вебер (Вб)", definition: "Единица измерения магнитного потока. 1 Вебер — это магнитный поток, при убывании которого до нуля за 1 секунду в контуре наводится ЭДС 1 Вольт. 1 Вб = 1 Тл·м²." },
        { term: "Вещество", definition: "То, из чего состоят все тела. Делятся на естественные и искусственные." },
        { term: "Внутренняя энергия (U)", definition: "Совокупность энергий всех молекул тела: средняя кинетическая энергия движения молекул, потенциальная энергия их взаимодействия и внутримолекулярная энергия." },
        { term: "Возгонка (сублимация)", definition: "Переход вещества из твёрдого состояния непосредственно в газообразное, минуя жидкую фазу. Пример: сухой лёд (CO₂), йод." },
        { term: "Волновая оптика", definition: "Раздел оптики, изучающий явления, связанные с волновой природой света: интерференцию, дифракцию, поляризацию." },
        { term: "Волосной гигрометр", definition: "Прибор для измерения влажности воздуха, действие которого основано на изменении длины обезжиренного человеческого волоса при изменении влажности." },
        { term: "Вольт (В)", definition: "Единица измерения напряжения. 1 Вольт — это напряжение, при котором перенос заряда 1 Кулон из одной точки в другую сопровождается совершением работы 1 Джоуль." },
        { term: "Вольтметр", definition: "Прибор для измерения напряжения. Включается параллельно. Имеет большое внутреннее сопротивление." },
        { term: "Влажный воздух", definition: "Смесь сухого воздуха и паров воды." }
    ],
    "Г": [
        { term: "Газообразное агрегатное состояние", definition: "Состояние вещества, в котором молекулы слабо связаны, движутся хаотично и занимают весь предоставленный объём. Газ не сохраняет ни форму, ни объём." },
        { term: "Газотурбинный двигатель", definition: "Тепловая машина непрерывного действия, в газовой турбине которой внутренняя энергия сжатого и нагретого газа преобразуется в механическую энергию вращения вала газовой турбины, а реактивная тяга образуется при истечении продуктов сгорания из реактивного сопла." },
        { term: "Гальванометр", definition: "Высокочувствительный электроизмерительный прибор магнитоэлектрической системы. Используется как основа для амперметров и вольтметров." },
        { term: "Геометрическая оптика", definition: "Раздел оптики, изучающий законы распространения света на основе представления о световых лучах. Основные законы: прямолинейного распространения, отражения, преломления." },
        { term: "Главная оптическая ось", definition: "Прямая, проходящая через центры кривизны обеих сферических поверхностей линзы." },
        { term: "Главный фокус линзы", definition: "Точка на главной оптической оси, в которой пересекаются лучи, падавшие на линзу параллельно главной оптической оси." },
        { term: "Горение", definition: "Химическая реакция окисления, протекающая с выделением теплоты и света." }
    ],
    "Д": [
        { term: "Давление газа", definition: "Давление, оказываемое газом на стенки сосуда, обусловленное ударами хаотически движущихся молекул." },
        { term: "Давление жидкости", definition: "Давление, обусловленное весом столба жидкости и её молекулярным взаимодействием. На глубине h: p = ρgh." },
        { term: "Давление твёрдого тела", definition: "Физическая величина, равная отношению силы F, действующей перпендикулярно поверхности, к площади S этой поверхности: p = F/S." },
        { term: "Дальнозоркость", definition: "Дефект зрения, при котором изображение фокусируется за сетчаткой. Корректируется собирающими линзами." },
        { term: "Двигатель внутреннего сгорания", definition: "Тепловая машина непрерывного действия, в рабочей зоне которой внутренняя энергия сгорающего жидкого или газообразного углеводородного топлива преобразуется в механическую энергию возвратно-поступательного движения поршня." },
        { term: "Действительное изображение", definition: "Изображение, образованное пересечением самих лучей. Может быть получено на экране." },
        { term: "Десублимация", definition: "Переход вещества из газообразного состояния непосредственно в твёрдое, минуя жидкую фазу. Пример: образование инея." },
        { term: "Диамагнетики", definition: "Вещества, намагничивающиеся во внешнем магнитном поле против направления поля. μ < 1." },
        { term: "Динамическое равновесие", definition: "Состояние, при котором скорость прямого процесса равна скорости обратного." },
        { term: "Диод", definition: "Нелинейный полупроводниковый элемент, пропускающий ток преимущественно в одном направлении. Виды: выпрямительный, стабилитрон, светодиод." },
        { term: "Дифференциал", definition: "Главная линейная часть приращения функции. Для функции y = f(x): dy = f'(x)dx. Геометрически — касательная к графику функции в данной точке." },
        { term: "Дифференцирование", definition: "Операция нахождения производной (или дифференциала) функции. Основные правила: производная суммы, произведения, частного, сложной функции." },
        { term: "Диэлектрики", definition: "Вещества, в которых практически отсутствуют свободные носители заряда." },
        { term: "Дополнительные цвета красок", definition: "Цвета, которые при субтрактивном смешении дают чёрный цвет. Например: голубой + жёлтый + пурпурный." },
        { term: "Дополнительные цвета лучей", definition: "Цвета, которые при аддитивном смешении дают белый свет. Например: красный + голубой; зелёный + пурпурный; синий + жёлтый." }
    ],
    "Ж": [
        { term: "Жидкое агрегатное состояние", definition: "Состояние вещества, в котором молекулы расположены близко, но могут перемещаться относительно друг друга. Жидкость сохраняет объём, но не сохраняет форму." }
    ],
    "З": [
        { term: "Закон Джоуля — Ленца", definition: "Q = I²Rt. Мощность тепловыделения P = I²R." },
        { term: "Закон Кулона", definition: "F = k|q₁q₂|/r². Сила взаимодействия двух неподвижных точечных зарядов." },
        { term: "Закон Ома для однородного участка цепи", definition: "I = U/R." },
        { term: "Закон Ома для полной цепи", definition: "I = E/(R + r)." },
        { term: "Закон Ома в дифференциальной форме", definition: "j = σE, где j — плотность тока, σ — удельная проводимость, E — напряжённость электрического поля." },
        { term: "Закон преломления света", definition: "sinα/sinβ = n₂/n₁. Луч падающий, луч преломленный и перпендикуляр, восставленный к границе раздела двух сред, лежат в одной плоскости." },
        { term: "Закон прямолинейного распространения света", definition: "В однородной среде свет распространяется прямолинейно. Следствие принципа Ферма." },
        { term: "Закон отражения света", definition: "Угол отражения равен углу падения. Луч падающий, луч отраженный и перпендикуляр, восставленный в точку падения, лежат в одной плоскости." },
        { term: "Закон распространения света", definition: "Свет в однородной среде распространяется прямолинейно и с постоянной скоростью v = c/n." },
        { term: "Закон сохранения электрического заряда", definition: "В замкнутой системе алгебраическая сумма электрических зарядов сохраняется." },
        { term: "Закон сохранения энергии", definition: "Энергия не возникает и не исчезает, она только переходит из одного вида в другой, и значение её сохраняется." },
        { term: "Законы параллельного соединения", definition: "U = U₁ = U₂; I = I₁ + I₂; 1/R = 1/R₁ + 1/R₂." },
        { term: "Законы последовательного соединения", definition: "I = I₁ = I₂; U = U₁ + U₂; R = R₁ + R₂." },
        { term: "Зеркальное отражение", definition: "Отражение от гладкой поверхности, при котором параллельный пучок остаётся параллельным." },
        { term: "Зоны видности плоского зеркала", definition: "Область пространства, из которой видно изображение источника." },
        { term: "Зрительная труба", definition: "Оптический прибор для наблюдения удалённых объектов. Бывает двух типов: труба Кеплера (перевёрнутое изображение) и труба Галилея (прямое изображение)." }
    ],
    "И": [
        { term: "Излучение", definition: "Вид теплопередачи, при котором энергия передаётся с помощью лучей (электромагнитных волн, преимущественно ИК диапазона) без участия вещества, даже в вакууме. Возможно для всех веществ." },
        { term: "Изменение внутренней энергии", definition: "Может происходить двумя способами: совершением работы над телом (или самим телом) и теплопередачей. ΔU = Q + A_внеш." },
        { term: "Измерительный мост", definition: "Электрическая схема для точного измерения сопротивлений. Состоит из четырёх резисторов, источника и гальванометра. Баланс моста: R₁/R₂ = R₃/R₄." },
        { term: "Инвариант Аббе", definition: "Для параксиальных лучей на сферической границе раздела сред: n₁(1/a - 1/R) = n₂(1/b - 1/R), где a и b — расстояния до предмета и изображения, R — радиус кривизны." },
        { term: "Индукция магнитного поля", definition: "Силовая характеристика магнитного поля. Вектор B. Единица: Тесла (Тл)." },
        { term: "Интеграл", definition: "Предел суммы бесконечно малых величин. Геометрически — ориентированная площадь под графиком функции. Формула Ньютона-Лейбница: ∫_a^b f(x)dx = F(b) - F(a)." },
        { term: "Интегрирование", definition: "Операция, обратная дифференцированию. Методы: замена переменной, интегрирование по частям." },
        { term: "Испарение", definition: "Парообразование с поверхности жидкости. Характеризуется уменьшением внутренней энергии, следовательно уменьшением температуры жидкости. Зависит от: скорость ветра (внешней диффузии), площадь поверхности, плотность пара над жидкостью, род вещества, температура жидкости." },
        { term: "Источник тока", definition: "Устройство, в котором сторонние силы разделяют заряды, создавая ЭДС." }
    ],
    "К": [
        { term: "Калориметр", definition: "Прибор для измерения количества теплоты." },
        { term: "Кипение", definition: "Интенсивное парообразование по всему объёму жидкости." },
        { term: "Количество теплоты (Q)", definition: "Скалярная физическая величина, равная изменению внутренней энергии тела при теплопередаче (без совершения работы)." },
        { term: "Конвекция", definition: "Вид теплопередачи, при котором энергия передаётся потоками (струями) вещества. Характерна для жидкостей и газов." },
        { term: "Конденсация", definition: "Переход вещества из газообразного состояния в жидкое." },
        { term: "Конденсационный гигрометр", definition: "Прибор для определения точки росы. Состоит из металлической полированной коробки, эфира и термометра. Фиксирует температуру появления росы на поверхности." },
        { term: "Коэффициент трансформации", definition: "Отношение напряжений на первичной и вторичной обмотках трансформатора на холостом ходу: k = U₁/U₂ = N₁/N₂." },
        { term: "КПД теплового двигателя", definition: "Скалярная физическая величина, показывающая оытношение совершённой полезной работы двигателя к энергии, полученной от нагревателя. η = A/Q_н = (Q_н - Q_х)/Q_н." },
        { term: "Кривошипно-шатунный механизм", definition: "Устройство, преобразующее поступательное движение шатуна во вращательное движение вала." },
        { term: "Кристаллизация (отвердевание)", definition: "Процесс перехода вещества из жидкого агрегатного состояния в твёрдое агрегатное состояние. Сопровождается уменьшением внутренней энергии (выделением энергии вовне), при постоянной температуре (температуре кристаллизации)." },
        { term: "Кулон (Кл)", definition: "Единица измерения электрического заряда. 1 Кулон — это заряд, проходящий через поперечное сечение проводника за 1 секунду при силе тока 1 Ампер." }
    ],
    "Л": [
        { term: "Лампа накаливания", definition: "Прибор, преобразующий электрическую энергию в тепловую и световую. Источник света, в котором вольфрамовая нить нагревается током до ~2500°C." },
        { term: "Линза", definition: "Прозрачное тело, ограниченное двумя сферическими поверхностями." },
        { term: "Линейное увеличение", definition: "Γ = H/h = |b|/a." },
        { term: "Линии индукции магнитного поля", definition: "Вооброжаемые линии, вдоль которых устанавливаются оси маленьких индикаторных магнитных стрелок, направление совпадает с северным магнитным полюсом индикаторной магнитной стрелки. Свойства: Не пересекаются, линии замкнуты, выходят из северного полюса магнита, входят в южный, густота линий пропорциональна величине магнитного поля в данной области пространства." },
        { term: "Линии напряжённости электрического поля", definition: "Линии, касательные к которым совпадают с направлением вектора E. Свойства: не пересекаются, начинаются на положительных зарядах, заканчиваются на отрицательных, густота пропорциональна модулю напряжённости электрического поля." },
        { term: "Линия электропередачи", definition: "Система проводов и оборудования для передачи электрической энергии на расстояние." },
        { term: "Лупа", definition: "Короткофокусная собирающая линза. Увеличение: Γ = d₀/f, где d₀ ≈ 25 см — расстояние наилучшего зрения." },
        { term: "Луч", definition: "Геометрическая линия, вдоль которой распространяется световая энергия. Нормаль к волновому фронту." }
    ],
    "М": [
        { term: "Магнитная проницаемость", definition: "μ = B/B₀. Показывает, во сколько раз вещество усиливает (или ослабляет) внешнее магнитное поле." },
        { term: "Магнитная индукция (B)", definition: "Векторная физическая величина, характеризующая поле в данной точке пространства. |B| = F/(I*l*sina)"},
        { term: "Магнитное поле", definition: "Особая форма материи, осуществляющая взаимодействие движущихся зарядов." },
        { term: "Магнитный полюс магнита", definition: "Область постоянного магнита, из которой выходят (северный N) или в которую входят (южный S) линии магнитной индукции." },
        { term: "Магнитостатика", definition: "Раздел электродинамики, изучающий магнитные поля постоянных токов и постоянных магнитов." },
        { term: "Метод нахождения тока в перемычке", definition: "Основан на применении правил Кирхгофа и закона Ома. Ток в перемычке определяется из разности потенциалов на её концах." },
        { term: "Метод узловых потенциалов", definition: "Метод расчёта электрических цепей, основанный на определении потенциалов узлов относительно опорного узла. Токи находят по закону Ома из разности потенциалов." },
        { term: "Метод эквивалентного источника", definition: "Замена активного двухполюсника эквивалентным источником с ЭДС E_экв и внутренним сопротивлением r_экв. E_экв равно напряжению холостого хода, r_экв — сопротивление при закороченных источниках ЭДС." },
        { term: "Механическая работа", definition: "Скалярная физическая величина, качественная мера действия силы на процесс движения тела, равная скалярному произведению вектора силы и вектора перемещения точки приложения силы." },
        { term: "Микроскоп", definition: "Оптический прибор для наблюдения малых объектов. Состоит из объектива и окуляра. Увеличение: Γ = (Δ·d₀)/(f₁·f₂)." },
        { term: "Мнимое изображение", definition: "Изображение, образованное пересечением продолжений лучей. Не может быть получено на экране." },
        { term: "Мнимый источник", definition: "Точка пересечения продолжений лучей, падающих на оптическую систему." },
        { term: "Мокрый снег", definition: "Смесь снежинок и воды. Температура гарантированно 0°С." },
        { term: "Молекула", definition: "Наименьшая частица вещества, сохраняющая его химические свойства. Состоит из атомов. Определяет состав и свойство вещества." },
        { term: "Молекулярно-кинетическая теория (МКТ)", definition: "Теория, объясняющая свойства вещества движением и взаимодействием частиц. Основные положения: 1) все тела состоят из частиц; 2) частицы хаотически движутся; 3) частицы взаимодействуют." },
        { term: "Мостик Уитстона", definition: "Измерительный мост для определения неизвестного сопротивления. Состоит из реохорда, гальванометра и резисторов. Баланс: R_x = R₀·l₁/l₂." },
        { term: "Мощность тока (P)", definition: "P = U·I = I²R = U²/R." }
    ],
    "Н": [
        { term: "Нагревание", definition: "Процесс увеличения внутренней энергии тела путём теплопередачи. Количество теплоты: Q = cmΔT." },
        { term: "Нагрузочная прямая", definition: "Прямая на ВАХ, определяющая режим работы нелинейного элемента в цепи. Строится из уравнения U = E - IR." },
        { term: "Напряжение (U)", definition: "Скалярная физическая величина, равная отношению работы, совершенной электрическим полем при переносе заряда из одной точки электрической цепи в другую, к величине этого заряда." },
        { term: "Напряжённость электрического поля (E)", definition: "Векторная физическая величина, которая характеризует силовое действие электрического поля в данной точке пространства. Она показывает, с какой силой поле воздействует на помещённый в него электрический заряд. E = F/q. Единица: Ньютон на Кулон (Н/Кл) = Вольт на метр (В/м)." },
        { term: "Насыщенный пар", definition: "Пар, находящийся в динамическом равновесии со своей жидкостью. Скорость испарения с поверхности жидкости равна скорости конденсации." },
        { term: "Нейтрон", definition: "Электрически нейтральная частица, входящая в состав атомных ядер. Масса ≈ 1,675·10⁻²⁷ кг." },
        { term: "Нелинейные элементы", definition: "Элементы цепи, ВАХ которых не является прямой линией. Примеры: диод, лампа накаливания, варистор." },
        { term: "Ненасыщенный пар", definition: "Пар, не находящийся в динамическом равновесии со своей жидкостью. Плотность ненасыщенного пара меньше плотности насыщенного." },
        { term: "Ньютон на Кулон (Н/Кл)", definition: "Единица измерения напряжённости электрического поля. 1 Н/Кл = 1 В/м. Напряжённость поля равна 1 Н/Кл, если поле действует на заряд 1 Кулон с силой 1 Ньютон." }
    ],
    "О": [
        { term: "Ом (Ом)", definition: "Единица измерения электрического сопротивления. 1 Ом — это сопротивление проводника, при котором напряжение на его концах 1 Вольт создаёт силу тока 1 Ампер." },
        { term: "Омметр", definition: "Прибор для измерения электрического сопротивления. Состоит из источника тока, гальванометра и добавочных резисторов." },
        { term: "Оптическая длина пути", definition: "Расстояние, которое свет прошёл бы в вакууме за то же время. Равна произведению геометрической длины пути l на показатель преломления n: L = n·l." },
        { term: "Оптическая ось тонкой линзы", definition: "Прямая, проходящая через оптический центр линзы. Главная ось — через центры кривизны; побочная — любая другая." },
        { term: "Оптическая сила линзы (D)", definition: "D = 1/F. Единица: диоптрия (дптр)." },
        { term: "Оптически однородная среда", definition: "Среда, во всех точках которой показатель преломления одинаков." },
        { term: "Оптический центр линзы", definition: "Точка линзы, проходя через которую луч не преломляется." },
        { term: "Оптическое зеркало", definition: "Гладкая поверхность, отражающая свет. Виды: плоское, сферическое (вогнутое, выпуклое), параболическое." },
        { term: "Оптическое изображение", definition: "Распределение освещённости, геометрически подобное предмету. Бывает действительным и мнимым." },
        { term: "Основные цвета красок", definition: "Голубой (C), пурпурный (M), жёлтый (Y). Субтрактивная модель CMY." },
        { term: "Основные цвета лучей", definition: "Красный (R), зелёный (G), синий (B). Аддитивная модель RGB." },
        { term: "Относительная влажность", definition: "φ = (ρ/ρ_н)·100% = (p/p_н)·100%. Степень насыщения воздуха водяным паром." },
        { term: "Относительный показатель преломления", definition: "Показатель преломления второй среды относительно первой: n₂₁ = n₂/n₁ = v₁/v₂." },
        { term: "Отражение света", definition: "Явление изменения направления распространения света на границе раздела двух сред, при котором свет возвращается в исходную среду." },
        { term: "Охлаждение", definition: "Процесс уменьшения внутренней энергии тела путём отвода теплоты." },
        { term: "Очки", definition: "Оптический прибор, корректирующий дефекты зрения. Состоит из линз, компенсирующих избыточную или недостаточную оптическую силу глаза." }
    ],
    "П": [
        { term: "Пар", definition: "Газообразное состояние вещества при температуре ниже критической. Может быть насыщенным и ненасыщенным." },
        { term: "Параксиальное приближение", definition: "Приближение, в котором рассматриваются только лучи, идущие под малыми углами к оптической оси (sinα ≈ α)." },
        { term: "Параллельное соединение", definition: "Соединение элементов, при котором они соединены к одной паре точек электрической цепи." },
        { term: "Парамагнетики", definition: "Вещества, намагничивающиеся по направлению поля. μ > 1. Примеры: алюминий, платина." },
        { term: "Паровая турбина", definition: "Тепловая машина непрерывного действия, в которой энергия пара преобразуется в механическую работу вращения ротора." },
        { term: "Паровой двигатель (двигатель внешнего сгорания)", definition: "Тепловая машина, в которой внутренняя энергия пара преобразуется в механическую энергию возвратно-поступательного движения поршня." },
        { term: "Парообразование", definition: "Переход вещества из жидкого состояния в газообразное. Включает испарение и кипение." },
        { term: "Перестроение ВАХ", definition: "Построение суммарной ВАХ цепи с нелинейными элементами путём сложения напряжений (последовательное) или токов (параллельное) при одинаковых токах или напряжениях." },
        { term: "Перископ", definition: "Оптический прибор из двух параллельных зеркал (или призм) под углом 45°, позволяющий видеть из-за укрытия." },
        { term: "Первое начало термодинамики", definition: "Закон сохранения энергии для тепловых процессов: ΔU = Q + A_внеш, где A_внеш — работа над системой." },
        { term: "Плавкий предохранитель", definition: "Устройство защиты электрической цепи, содержащее легкоплавкую вставку, которая плавится при превышении тока, размыкая цепь." },
        { term: "Плавление", definition: "Фазовый переход из твёрдого состояния в жидкое. Происходит при постоянной температуре (температуре плавления) с поглощением теплоты." },
        { term: "Плоское зеркало", definition: "Плоская поверхность, зеркально отражающая свет. Изображение: мнимое, прямое, равное по размеру, симметричное относительно плоскости зеркала." },
        { term: "Плотность насыщенного пара", definition: "Зависит только от температуры. Не зависит от объёма. При уменьшении объёма пар конденсируется, плотность не меняется." },
        { term: "Плотность тока (j)", definition: "Векторная величина, равная силе тока, проходящего через единицу площади поперечного сечения: j = I/S. Связана с напряжённостью: j = σE." },
        { term: "Побочная оптическая ось", definition: "Любая прямая, проходящая через оптический центр линзы, кроме главной оптической оси." },
        { term: "Побочный фокус линзы", definition: "Точка на фокальной плоскости, в которой собираются лучи, падающие на линзу параллельно побочной оптической оси." },
        { term: "Полное внутреннее отражение", definition: "Явление, при котором свет не выходит из оптически более плотной среды в менее плотную, если угол падения превышает предельный: sinα₀ = n₂/n₁ (n₁ > n₂)." },
        { term: "Положительный заряд", definition: "Заряд, подобный заряду протона. Обозначается знаком «+». Одноимённые заряды отталкиваются, разноимённые — притягиваются." },
        { term: "Полупроводник", definition: "Вещество, удельная проводимость которого занимает промежуточное положение между проводниками и диэлектриками и сильно зависит от температуры, освещённости и наличия примесей." },
        { term: "Полутень", definition: "Область пространства, в которую попадает свет только от части протяжённого источника света. Граница размытая." },
        { term: "Поперечное увеличение", definition: "Отношение линейного размера изображения к линейному размеру предмета: Γ = H/h = |f|/d." },
        { term: "Последовательное соединение", definition: "Соединение элементов цепи, при котором они следуют один за другим без разветвлений." },
        { term: "Постоянный магнит", definition: "Тело, длительно сохраняющее намагниченность после снятия внешнего магнитного поля." },
        { term: "Потенциал электростатического поля (φ)", definition: "Энергетическая характеристика поля. Скалярная величина, равная потенциальной энергии единичного положительного заряда: φ = W_p/q. Единица: Вольт (В)." },
        { term: "Потенциометр", definition: "Переменный резистор, включённый как делитель напряжения (три вывода: два крайних и подвижный контакт)." },
        { term: "Потребитель тока", definition: "Элемент электрической цепи, преобразующий электрическую энергию в другие виды (тепловую, механическую, световую и т.д.)." },
        { term: "Правило левой руки №1 (для силы Ампера)", definition: "Если расположить левую руку так, чтобы вектор магнитной индукции B входил в ладонь, четыре пальца были направлены по току, то отставленный большой палец укажет направление силы Ампера." },
        { term: "Правило левой руки №2 (для силы Лоренца)", definition: "Если расположить левую руку так, чтобы вектор B входил в ладонь, четыре пальца были направлены по скорости движения положительного заряда, то большой палец укажет направление силы Лоренца. Для отрицательного заряда сила противоположна." },
        { term: "Правило Ленца", definition: "Индукционный ток, возникающий в замкнутом контуре, всегда направлен так, чтобы противодействовать причине, его вызывающей." },
        { term: "Правило правой руки №1 (для прямого проводника)", definition: "Если обхватить проводник правой рукой так, чтобы большой палец указывал направление тока, то остальные пальцы укажут направление линий магнитной индукции." },
        { term: "Правило правой руки №2 (для соленоида)", definition: "Если обхватить соленоид правой рукой так, чтобы четыре пальца были направлены по току в витках, то отставленный большой палец укажет направление вектора B внутри соленоида." },
        { term: "Правила знаков в формуле тонкой линзы", definition: "d > 0 (предмет действительный); f > 0 для действительного изображения, f < 0 для мнимого; F > 0 для собирающей линзы, F < 0 для рассеивающей." },
        { term: "Правила построения изображения в тонкой линзе", definition: "1) Луч через оптический центр не преломляется. 2) Луч, параллельный главной оптической оси, после преломления идёт через фокус. 3) Луч, идущий через фокус, после преломления идёт параллельно главной оптической оси." },
        { term: "Преломление света", definition: "Изменение направления распространения света при переходе через границу раздела двух сред, вызванное изменением скорости света." },
        { term: "Принцип суперпозиции для электростатического поля", definition: "Напряжённость поля системы зарядов равна векторной сумме напряжённостей полей каждого заряда: E = ΣE_i. Потенциал — алгебраическая сумма потенциалов: φ = Σφ_i." },
        { term: "Принцип Ферма", definition: "Свет распространяется по пути, на прохождение которого требуется минимальное время." },
        { term: "Прирощение внутренней энергии газа", definition: "Равно сумме работы, совершённой над газом, и количества теплоты, переданной газу: ΔU = A + Q." },
        { term: "Проводимость", definition: "Величина, обратная сопротивлению: G = 1/R. Единица: Сименс (См). Удельная проводимость σ = 1/ρ." },
        { term: "Проводник", definition: "Вещество, содержащее свободные носители электрического заряда (в металлах — свободные электроны, в электролитах — ионы)." },
        { term: "Продольное увеличение", definition: "Отношение перемещения изображения вдоль оптической оси к перемещению предмета. Для тонкой линзы: α = b²/a² = Γ²." },
        { term: "Производная", definition: "Предел отношения приращения функции к приращению аргумента при стремлении приращения аргумента к нулю: f'(x) = lim(Δf/Δx) при Δx→0. Характеризует скорость изменения функции." },
        { term: "Протон", definition: "Стабильная элементарная частица, входящая в состав атомных ядер. Имеет положительный заряд +e = 1,6·10⁻¹⁹ Кл и массу ≈ 1,673·10⁻²⁷ кг." },
        { term: "Психрометр", definition: "Прибор для измерения влажности воздуха, состоящий из двух термометров: сухого и влажного (резервуар обмотан влажной тканью)." },
        { term: "1-е положение МКТ", definition: "Все тела состоят из мельчайших частиц (молекул, атомов), между которыми есть промежутки." },
        { term: "2-е положение МКТ", definition: "Частицы вещества находятся в непрерывном хаотическом движении. Доказательство: броуновское движение, диффузия." },
        { term: "3-е положение МКТ", definition: "Частицы вещества взаимодействуют между собой: притягиваются и отталкиваются." }
    ],
    "Р": [
        { term: "Работа электрического тока", definition: "A = U·I·t. Работа, совершаемая электрическим полем при перемещении заряда по участку цепи." },
        { term: "Рассеивающая линза", definition: "Линза, преобразующая параллельный пучок света в расходящийся. Фокус мнимый, F < 0." },
        { term: "Рассеянное отражение", definition: "Отражение света от шероховатой поверхности, при котором параллельный пучок становится расходящимся." },
        { term: "Расстояние наилучшего зрения", definition: "Расстояние от глаза до предмета, при котором нормальный глаз видит его наиболее чётко без утомления. Для среднего глаза d₀ ≈ 25 см." },
        { term: "Расчёт полубесконечных цепочек", definition: "Метод, основанный на том, что добавление одного звена к бесконечной цепочке не меняет её полного сопротивления. Сводится к квадратному уравнению." },
        { term: "Резистор", definition: "Пассивный элемент электрической цепи, обладающий определённым сопротивлением." },
        { term: "Реостат", definition: "Переменный резистор, служащий для регулировки силы тока в цепи (включается последовательно)." },
        { term: "Роса", definition: "Атмосферное явление: капли воды, конденсирующиеся на охлаждённых поверхностях при достижении точки росы." }
    ],
    "С": [
        { term: "Свет", definition: "Электромагнитное излучение, воспринимаемое человеческим глазом. Диапазон длин волн примерно 380–780 нм." },
        { term: "Световой луч", definition: "Линия, вдоль которой распространяется световая энергия. В геометрической оптике — нормаль к волновому фронту." },
        { term: "Световой пучок", definition: "Совокупность световых лучей. Различают параллельные, сходящиеся и расходящиеся пучки." },
        { term: "Сетчатка", definition: "Внутренняя оболочка глаза, содержащая светочувствительные рецепторы (палочки и колбочки), преобразующие световой сигнал в нервный импульс." },
        { term: "Сила Ампера", definition: "Сила, действующая на прямолинейный проводник с током в однородном магнитном поле. F_A = B·I·L·sinα." },
        { term: "Сила Лоренца", definition: "Сила, действующая на движущуюся заряженную частицу в магнитном поле. F_Л = q·v·B·sinα." },
        { term: "Сила тока (I)", definition: "Скалярная физическая величина, равная электрическому заряду, проходящему через поперечное сечение проводника за единицу времени: I = dq/dt. Единица: Ампер (А)." },
        { term: "Силовые линии электрического поля", definition: "Линии, касательные к которым в каждой точке совпадают с направлением вектора напряжённости E. Начинаются на положительных зарядах, заканчиваются на отрицательных." },
        { term: "Симметрии и антисимметрии электрических схем", definition: "Метод упрощения расчёта цепей путём выявления точек с одинаковым потенциалом (симметрия) или точек, потенциалы которых противоположны (антисимметрия)." },
        { term: "Сименс (См)", definition: "Единица измерения электрической проводимости. 1 Сименс — это проводимость участка цепи с сопротивлением 1 Ом. 1 См = 1 Ом⁻¹ = 1 А/В." },
        { term: "Скорость распространения света", definition: "В вакууме c ≈ 3·10⁸ м/с. В среде v = c/n, где n — абсолютный показатель преломления среды." },
        { term: "Собирающая линза", definition: "Линза, преобразующая параллельный пучок света в сходящийся. Фокус действительный, F > 0." },
        { term: "Соленоид", definition: "Цилиндрическая катушка с током, создающая внутри себя практически однородное магнитное поле." },
        { term: "Сопротивление (R)", definition: "Мера способности проводника препятствовать протеканию электрического тока. R = U/I. Единица: Ом." },
        { term: "Спектр", definition: "Совокупность цветных полос, на которые разлагается свет при дисперсии. Виды: сплошной, линейчатый, полосатый." },
        { term: "Способы изменения внутренней энергии", definition: "Совершение механической работы (трение, деформация), теплопередача (теплопроводность, конвекция, излучение), химические реакции." },
        { term: "Спектроскоп", definition: "Прибор для визуального наблюдения спектров излучения. Состоит из щели, коллиматора, диспергирующего элемента (призма или дифракционная решётка) и зрительной трубы." },
        { term: "Субтрактивная цветовая модель красок (CMY)", definition: "Модель синтеза цвета, основанная на вычитании цветов из белого света. Основные цвета: голубой (Cyan), пурпурный (Magenta), жёлтый (Yellow). Смесь всех трёх даёт чёрный." },
        { term: "Сферическое зеркало", definition: "Зеркало, отражающая поверхность которого имеет форму сферического сегмента. Вогнутое — собирающее, выпуклое — рассеивающее. Фокусное расстояние f = R/2." },
        { term: "Сухой воздух", definition: "Смесь газов, составляющих атмосферу Земли без водяного пара. Основные компоненты: N₂ (~78%), O₂ (~21%), Ar (~0,9%), CO₂ (~0,04%)." }
    ],
    "Т": [
        { term: "Твёрдое агрегатное состояние", definition: "Состояние вещества, характеризующееся наличием кристаллической решётки. Частицы совершают колебания около положений равновесия. Сохраняет форму и объём." },
        { term: "Телескоп", definition: "Оптический прибор для наблюдения удалённых небесных объектов. Виды: рефрактор (линзовый), рефлектор (зеркальный)." },
        { term: "Температура (с точки зрения МКТ)", definition: "Мера средней кинетической энергии поступательного движения молекул: (m₀v²)/2 = (3/2)kT." },
        { term: "Температура (с точки зрения термодинамики)", definition: "Параметр состояния, определяющий направление теплопередачи: теплота самопроизвольно переходит от тела с более высокой температурой к телу с более низкой температурой." },
        { term: "Тень", definition: "Область пространства, в которую не попадает свет от источника (при точечном источнике — полная тень)." },
        { term: "Тепловая машина", definition: "Устройство, преобразующее внутреннюю энергию топлива в механическую работу. Состоит из нагревателя, рабочего тела и холодильника." },
        { term: "Тепловая мощность", definition: "Количество теплоты, передаваемое за единицу времени: P = Q/t = dQ/dt." },
        { term: "Тепловое движение молекул", definition: "Хаотическое (неупорядоченное) движение частиц, из которых состоит вещество. Интенсивность движения зависит от температуры." },
        { term: "Тепловое равновесие", definition: "Состояние системы, при котором все макроскопические параметры (температура, давление) остаются неизменными сколь угодно долго, и в системе отсутствуют тепловые потоки." },
        { term: "Тепловой двигатель", definition: "Тепловая машина, преобразующая внутреннюю энергию сгорающего топлива в механическую работу." },
        { term: "Теплоёмкость тела (C)", definition: "Количество теплоты, необходимое для нагрева тела на 1 К: C = Q/ΔT. Единица: Дж/К." },
        { term: "Теплообмен", definition: "Процесс передачи внутренней энергии от более нагретых тел к менее нагретым без совершения макроскопической работы." },
        { term: "Теплопередача", definition: "Самопроизвольный процесс переноса энергии от более нагретых тел к менее нагретым. Виды: теплопроводность, конвекция, излучение." },
        { term: "Теплопроводность", definition: "Вид теплопередачи, при котором энергия передаётся от более нагретых участков тела к менее нагретым в результате взаимодействия частиц (атомов, молекул, электронов). Переноса вещества нет." },
        { term: "Термодинамическая фаза", definition: "Однородная по составу и свойствам часть термодинамической системы, отделённая от других фаз поверхностью раздела." },
        { term: "Тесла (Тл)", definition: "Единица измерения магнитной индукции в СИ. 1 Тесла — это индукция однородного магнитного поля, которое: 1) действует на проводник длиной 1 м с током 1 А с максимальной силой 1 Н (определение через поступательное движение); 2) создаёт на рамку с магнитным моментом 1 А·м² максимальный вращающий момент 1 Н·м (определение через вращательное движение)." },
        { term: "Тонкая линза", definition: "Линза, толщиной которой можно пренебречь по сравнению с радиусами кривизны её поверхностей и расстояниями до предмета и изображения." },
        { term: "Точечный источник света", definition: "Источник света, размерами которого можно пренебречь по сравнению с расстоянием до точки наблюдения." },
        { term: "Точка росы", definition: "Температура, при которой водяной пар, содержащийся в воздухе, становится насыщенным. При охлаждении ниже этой температуры начинается конденсация." },
        { term: "Трансформатор", definition: "Устройство для преобразования напряжения переменного тока, основанное на явлении электромагнитной индукции. Состоит из двух (или более) обмоток на общем магнитопроводе." }
    ],
    "У": [
        { term: "Увеличение линзы", definition: "Линейное увеличение Γ = H/h = |f|/d, где H — размер изображения, h — размер предмета, f — расстояние от линзы до изображения, d — расстояние от линзы до предмета." },
        { term: "Угол Брюстера", definition: "Угол падения, при котором отражённый от диэлектрика свет полностью поляризован. tg α_Бр = n₂₁, где n₂₁ — относительный показатель преломления." },
        { term: "Угол зрения", definition: "Угол между лучами, идущими от крайних точек предмета к глазу." },
        { term: "Угол отражения", definition: "Угол между отражённым лучом и нормалью к поверхности в точке падения. По закону отражения равен углу падения." },
        { term: "Угол падения", definition: "Угол между падающим лучом и нормалью к поверхности в точке падения." },
        { term: "Угол полного внутреннего отражения", definition: "Предельный угол падения, при котором преломлённый луч скользит по границе раздела: sinα₀ = n₂/n₁ (при n₁ > n₂)." },
        { term: "Угол преломления", definition: "Угол между преломлённым лучом и нормалью к поверхности в точке падения." },
        { term: "Удельная теплоёмкость (c)", definition: "Количество теплоты, необходимое для нагревания 1 кг вещества на 1 К: c = Q/(m·ΔT). Единица: Дж/(кг·К)." },
        { term: "Удельная теплота испарения", definition: "Количество теплоты, необходимое для превращения 1 кг жидкости в пар при постоянной температуре (без изменения температуры)." },
        { term: "Удельная теплота кипения", definition: "Количество теплоты, необходимое для превращения 1 кг жидкости в пар при температуре кипения. Численно равна удельной теплоте парообразования." },
        { term: "Удельная теплота конденсации", definition: "Количество теплоты, выделяющееся при конденсации 1 кг пара. Численно равна удельной теплоте парообразования." },
        { term: "Удельная теплота кристаллизации", definition: "Количество теплоты, выделяющееся при кристаллизации 1 кг вещества. Численно равна удельной теплоте плавления." },
        { term: "Удельная теплота парообразования", definition: "Количество теплоты, необходимое для превращения 1 кг жидкости в пар при постоянной температуре." },
        { term: "Удельная теплота плавления", definition: "Количество теплоты, необходимое для превращения 1 кг кристаллического вещества в жидкость при температуре плавления." },
        { term: "Удельная теплота сгорания топлива", definition: "Количество теплоты, выделяющееся при полном сгорании 1 кг топлива. Единица: Дж/кг." },
        { term: "Удельное сопротивление (ρ)", definition: "Физическая величина, характеризующая способность вещества сопротивляться протеканию электрического тока. ρ = R·S/L. Единица: Ом·м." },
        { term: "Уравнение теплового баланса", definition: "В теплоизолированной системе сумма количеств теплоты, отданных одними телами, равна сумме количеств теплоты, полученных другими телами: ΣQ_отд = ΣQ_пол." }
    ],
    "Ф": [
        { term: "Фаза (термодинамическая)", definition: "Однородная по химическому составу и физическим свойствам часть системы, отделённая от других фаз поверхностями раздела." },
        { term: "Ферриты", definition: "Ферромагнитные материалы на основе оксидов железа с высоким удельным электрическим сопротивлением. Используются в высокочастотной технике." },
        { term: "Ферромагнетики", definition: "Вещества (Fe, Ni, Co и их сплавы), обладающие спонтанной намагниченностью и очень высокой магнитной проницаемостью (μ >> 1). Характеризуются гистерезисом и точкой Кюри." },
        { term: "Физика", definition: "Наука о наиболее общих законах природы, о материи, её структуре, движении и взаимодействии." },
        { term: "Физическое тело", definition: "Любой материальный объект, имеющий форму, объём и границы." },
        { term: "Физическое явление", definition: "Процесс изменения состояния или свойств физической системы (механические, тепловые, электрические, магнитные, оптические явления)." },
        { term: "Фокальная плоскость линзы", definition: "Плоскость, проходящая через главный фокус линзы перпендикулярно главной оптической оси." },
        { term: "Фокусное расстояние линзы (F)", definition: "Расстояние от оптического центра линзы до главного фокуса." },

// Подсчёт статистики
let totalTerms = 0;
let totalQuestions = 0;
for(const letter in D) {
    totalTerms += D[letter].length;
}
gradesData.forEach(grade => {
    grade.topics.forEach(topic => {
        if(topic.questions) totalQuestions += topic.questions.length;
    });
});

const L = ["А","Б","В","Г","Д","Ж","З","И","К","Л","М","Н","О","П","Р","С","Т","У","Ф","Х","Э"];
const container = document.getElementById("gradesContainer");
const footerStats = document.getElementById("footerStats");
footerStats.innerHTML = `Всего терминов: ${totalTerms} | Дополнительных вопросов: ${totalQuestions}<br><br><span style="font-size:0.8rem;color:#999;">Прошу простить за неточности, т.к. среди такого количества мог что-то пропустить или ошибиться.</span>`;

function groupByLetter(terms) {
    const grouped = {};
    terms.forEach(name => {
        const t = allTermNames[name];
        if(!t) return;
        const letter = name.charAt(0).toUpperCase();
        if(!grouped[letter]) grouped[letter] = [];
        grouped[letter].push(t);
    });
    return grouped;
}

gradesData.forEach(grade => {
    const gCard = document.createElement("div"); gCard.className = "grade-card";
    const gH = document.createElement("div"); gH.className = "grade-header";
    gH.innerHTML = `<span class="grade-title">${grade.name}</span><span class="grade-arrow">▶</span>`;
    const gB = document.createElement("div"); gB.className = "grade-body";
    let gOpen = false;
    gH.onclick = () => { gOpen=!gOpen; gB.classList.toggle("show",gOpen); gH.querySelector(".grade-arrow").classList.toggle("open",gOpen); };

    if(grade.topics.length === 0) {
        const empty = document.createElement("div");
        empty.style.cssText = "padding:20px 36px;color:#999;font-style:italic;";
        empty.textContent = "К высочайшему сожалению, я не доучился до этого класса, поэтому здесь пусто. Прошу простить и понять";
        gB.appendChild(empty);
    }

    grade.topics.forEach(topic => {
        const tCard = document.createElement("div"); tCard.className = "topic-card";
        const tH = document.createElement("div"); tH.className = "topic-header";
        tH.innerHTML = `<span class="topic-title">${topic.name}</span><span class="topic-arrow">▶</span>`;
        const tB = document.createElement("div"); tB.className = "topic-body";
        let tOpen = false;
        tH.onclick = (e) => { e.stopPropagation(); tOpen=!tOpen; tB.classList.toggle("show",tOpen); tH.querySelector(".topic-arrow").classList.toggle("open",tOpen); };

        const grouped = groupByLetter(topic.terms);
        L.forEach(letter => {
            if(!grouped[letter]) return;
            const lItem = document.createElement("div"); lItem.className = "letter-item";
            const lH = document.createElement("div"); lH.className = "letter-header";
            lH.innerHTML = `<div class="letter-title"><div class="letter-icon">${letter}</div><div class="letter-name">Буква ${letter}</div></div><span class="arrow-icon">▶</span>`;
            const lB = document.createElement("div"); lB.className = "terms-list";
            const grid = document.createElement("div"); grid.className = "terms-grid";
            grouped[letter].forEach(t => {
                const btn = document.createElement("button"); btn.className = "term-btn"; btn.textContent = t.term;
                btn.onclick = (e) => { e.stopPropagation(); openModal(t); };
                grid.appendChild(btn);
            });
            lB.appendChild(grid); lItem.appendChild(lH); lItem.appendChild(lB); tB.appendChild(lItem);
            let lOpen = false;
            lH.onclick = (e) => { e.stopPropagation(); lOpen=!lOpen; lB.classList.toggle("show",lOpen); lH.querySelector(".arrow-icon").classList.toggle("open",lOpen); };
        });

        if(topic.questions && topic.questions.length > 0) {
            const qCard = document.createElement("div"); qCard.className = "letter-item";
            const qH = document.createElement("div"); qH.className = "letter-header";
            qH.innerHTML = `<div class="letter-title"><div class="letter-icon" style="background:#2c3e50;color:#fff;">?</div><div class="letter-name">Дополнительные вопросы</div></div><span class="arrow-icon">▶</span>`;
            const qB = document.createElement("div"); qB.className = "terms-list";
            const grid = document.createElement("div"); grid.className = "questions-grid";
            topic.questions.forEach(q => {
                const btn = document.createElement("button"); btn.className = "question-btn"; btn.textContent = q.term;
                btn.onclick = (e) => { e.stopPropagation(); openModal(q); };
                grid.appendChild(btn);
            });
            qB.appendChild(grid); qCard.appendChild(qH); qCard.appendChild(qB); tB.appendChild(qCard);
            let qOpen = false;
            qH.onclick = (e) => { e.stopPropagation(); qOpen=!qOpen; qB.classList.toggle("show",qOpen); qH.querySelector(".arrow-icon").classList.toggle("open",qOpen); };
        }

        tCard.appendChild(tH); tCard.appendChild(tB); gB.appendChild(tCard);
    });
    gCard.appendChild(gH); gCard.appendChild(gB); container.appendChild(gCard);
});

function openModal(item) {
    document.getElementById("modalTermName").textContent = item.term;
    document.getElementById("modalDefinition").textContent = item.definition;
    document.getElementById("termModal").style.display = "flex";
}
document.querySelector(".modal-close").onclick = () => document.getElementById("termModal").style.display = "none";
window.onclick = (e) => { if (e.target === document.getElementById("termModal")) document.getElementById("termModal").style.display = "none"; };
</script>
