<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Словарь физических терминов — 239</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #4a4a6a;
            --accent: #2c3e50;
            --accent-light: #e8ecf1;
            --border: #eef0f5;
            --hover: #f0f3f8;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 40px 20px;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 36px;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--accent);
        }
        .header p {
            color: var(--text-secondary);
            margin-top: 6px;
            font-size: 0.9rem;
            font-weight: 450;
        }
        .dictionary-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .accordion-list {
            padding: 0;
        }
        .letter-item {
            border-bottom: 1px solid var(--border);
        }
        .letter-item:last-child {
            border-bottom: none;
        }
        .letter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            cursor: pointer;
            transition: background var(--transition);
            user-select: none;
        }
        .letter-header:hover {
            background: var(--hover);
        }
        .letter-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .letter-icon {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
            background: var(--accent-light);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .letter-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }
        .arrow-icon {
            font-size: 16px;
            color: var(--text-secondary);
            transition: transform var(--transition);
        }
        .arrow-icon.open {
            transform: rotate(90deg);
        }
        .terms-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
            background: #fafbfc;
            border-top: 1px solid transparent;
        }
        .terms-list.show {
            max-height: 5000px;
            border-top-color: var(--border);
        }
        .terms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 8px;
            padding: 16px 24px 24px 24px;
        }
        .term-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            transition: all var(--transition);
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .term-btn::before {
            content: "▸";
            font-size: 10px;
            color: var(--text-secondary);
            flex-shrink: 0;
            transition: transform var(--transition);
        }
        .term-btn:hover {
            background: #f6f8fb;
            border-color: #c0c8d4;
            transform: translateX(2px);
        }
        .term-btn:hover::before {
            transform: translateX(2px);
            color: var(--accent);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 30, 0.4);
            backdrop-filter: blur(2px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-content {
            background: var(--card-bg);
            max-width: 680px;
            width: 100%;
            border-radius: var(--radius);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
        .modal-header {
            background: var(--card-bg);
            padding: 16px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .modal-header h2 {
            font-size: 1.15rem;
            font-weight: 650;
            color: var(--accent);
            margin: 0;
        }
        .modal-close {
            font-size: 22px;
            cursor: pointer;
            color: var(--text-secondary);
            line-height: 1;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all var(--transition);
        }
        .modal-close:hover {
            background: var(--hover);
            color: var(--text);
        }
        .modal-body {
            padding: 22px;
        }
        .definition-text {
            background: #fafbfc;
            padding: 18px;
            border-radius: 12px;
            line-height: 1.65;
            color: var(--text);
            font-size: 0.92rem;
            border: 1px solid var(--border);
        }
        @media (max-width: 600px) {
            body {
                padding: 20px 12px;
            }
            .header h1 {
                font-size: 1.6rem;
            }
            .terms-grid {
                grid-template-columns: 1fr;
                padding: 12px 16px 20px 16px;
            }
            .letter-header {
                padding: 12px 16px;
            }
            .modal-body {
                padding: 16px;
            }
            .definition-text {
                padding: 14px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Словарь физических терминов</h1>
        <p>В том числе дополнительные вопросы к билетам экзамена</p>
        <p style="font-size: 0.8rem; color: #888; margin-top: 2px;">Может помочь перед экзаменом (но я за это не ручаюсь)</p>
    </div>

    <div class="dictionary-card">
        <div id="accordionContainer" class="accordion-list"></div>
    </div>
</div>

<div id="termModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTermName"></h2>
            <span class="modal-close">&times;</span>
        </div>
        <div class="modal-body">
            <div class="definition-text" id="modalDefinition"></div>
        </div>
    </div>
</div>

<script>
    const dictionary = {
        "А": [
            { term: "Абсолютная влажность", definition: "Масса водяного пара в единице объёма воздуха. Измеряется в г/м³ или кг/м³ (СИ). (Билет №13)" },
            { term: "Абсолютная влажность воздуха", definition: "Масса водяного пара, содержащегося в 1 м³ воздуха при данных условиях. Измеряется в г/м³." },
            { term: "Абсолютная влажность пара", definition: "Масса водяного пара в единице объёма. Численно равна плотности пара при данных условиях." },
            { term: "Абсолютный показатель преломления", definition: "Отношение скорости света c в вакууме к скорости света v в данной среде: n = c/v. Характеризует оптическую плотность среды." },
            { term: "Агрегатное состояние", definition: "Состояние вещества, характеризующееся определёнными качественными свойствами: способностью сохранять форму и объём, наличием или отсутствием дальнего порядка. Основные состояния: твёрдое, жидкое, газообразное." },
            { term: "Аддитивная цветовая модель лучей", definition: "Модель цветообразования, основанная на сложении (смешении) световых лучей трёх основных цветов: красного (R), зелёного (G), синего (B). Сумма всех трёх даёт белый цвет." },
            { term: "Аккомодация", definition: "Способность глаза изменять кривизну хрусталика для получения чёткого изображения предметов, находящихся на различных расстояниях. (Билет №14)" },
            { term: "Ампер (А)", definition: "Единица силы тока в СИ. 1 А равен силе неизменяющегося тока, который при прохождении по двум параллельным бесконечно длинным проводникам ничтожно малого сечения, расположенным в вакууме на расстоянии 1 м друг от друга, вызывает на каждом метре длины силу взаимодействия 2·10⁻⁷ Н. (Билеты №1, №5, №10, №11, №12, №15)" },
            { term: "Амперметр", definition: "Прибор для измерения силы тока. Включается последовательно. Имеет малое внутреннее сопротивление. В основе — гальванометр с шунтом. (Билеты №1, №5, №10, №15)" },
            { term: "Атом", definition: "Наименьшая частица химического элемента, являющаяся носителем его свойств. Состоит из положительно заряженного ядра и электронной оболочки." }
        ],
        "Б": [
            { term: "Близорукость", definition: "Дефект зрения, при котором изображение удалённого предмета фокусируется перед сетчаткой. Корректируется рассеивающими линзами. (Билет №14)" }
        ],
        "В": [
            { term: "Ватт (Вт)", definition: "Единица мощности в СИ. 1 Вт = 1 Дж/с. Для электрической цепи: P = U·I. (Билет №11)" },
            { term: "ВАХ (вольт-амперная характеристика)", definition: "График зависимости силы тока I через элемент от напряжения U на нём. Для линейных элементов — прямая; для нелинейных (диод, лампа накаливания) — кривая." },
            { term: "Вектор магнитной индукции (B)", definition: "Силовая характеристика магнитного поля. Направление вектора B совпадает с направлением северного полюса магнитной стрелки. Модуль B = F_A/(I·L·sinα). Единица: Тесла (Тл). (Билеты №1, №12)" },
            { term: "Вещество", definition: "Вид материи, обладающий массой покоя. Состоит из атомов, молекул или ионов." },
            { term: "Внутренняя энергия (U)", definition: "Сумма кинетической энергии теплового движения частиц и потенциальной энергии их взаимодействия. Изменяется путём совершения работы и теплопередачи. (Билеты №4, №6, №7, №8)" },
            { term: "Возгонка (сублимация)", definition: "Переход вещества из твёрдого состояния непосредственно в газообразное, минуя жидкую фазу. Пример: сухой лёд (CO₂), йод." },
            { term: "Волновая оптика", definition: "Раздел оптики, изучающий явления, связанные с волновой природой света: интерференцию, дифракцию, поляризацию." },
            { term: "Волосной гигрометр", definition: "Прибор для измерения влажности воздуха, действие которого основано на изменении длины обезжиренного человеческого волоса при изменении влажности." },
            { term: "Вольт (В)", definition: "Единица напряжения. 1 В = 1 Дж/Кл. (Билеты №5, №10, №11, №15)" },
            { term: "Вольтметр", definition: "Прибор для измерения напряжения. Включается параллельно. Имеет большое внутреннее сопротивление. (Билеты №1, №5, №10, №15)" }
        ],
        "Г": [
            { term: "Газообразное агрегатное состояние", definition: "Состояние вещества, в котором молекулы слабо связаны, движутся хаотично и занимают весь предоставленный объём. Газ не сохраняет ни форму, ни объём." },
            { term: "Газотурбинный двигатель", definition: "Тепловой двигатель, в котором энергия сжатого и нагретого газа преобразуется в механическую работу вращения турбины." },
            { term: "Гальванометр", definition: "Высокочувствительный электроизмерительный прибор магнитоэлектрической системы. Используется как основа для амперметров и вольтметров. (Билеты №1, №5, №10, №15)" },
            { term: "Геометрическая оптика", definition: "Раздел оптики, изучающий законы распространения света на основе представления о световых лучах. Основные законы: прямолинейного распространения, отражения, преломления. (Билеты №2, №3, №14)" },
            { term: "Главная оптическая ось", definition: "Прямая, проходящая через центры кривизны обеих сферических поверхностей линзы. (Билеты №2, №3, №14)" },
            { term: "Главный фокус линзы", definition: "Точка на главной оптической оси, в которой пересекаются лучи, падавшие на линзу параллельно главной оптической оси. (Билеты №2, №3, №14)" },
            { term: "Горение", definition: "Химическая реакция окисления, протекающая с выделением теплоты и света." }
        ],
        "Д": [
            { term: "Давление газа", definition: "Давление, оказываемое газом на стенки сосуда, обусловленное ударами хаотически движущихся молекул." },
            { term: "Давление жидкости", definition: "Давление, обусловленное весом столба жидкости и её молекулярным взаимодействием. На глубине h: p = ρgh." },
            { term: "Давление твёрдого тела", definition: "Физическая величина, равная отношению силы F, действующей перпендикулярно поверхности, к площади S этой поверхности: p = F/S." },
            { term: "Дальнозоркость", definition: "Дефект зрения, при котором изображение фокусируется за сетчаткой. Корректируется собирающими линзами. (Билет №14)" },
            { term: "Двигатель внутреннего сгорания", definition: "Тепловая машина, в которой топливо сгорает внутри цилиндра. (Билет №7)" },
            { term: "Действительное изображение", definition: "Изображение, образованное пересечением самих лучей. Может быть получено на экране. (Билеты №2, №3, №14)" },
            { term: "Десублимация", definition: "Переход вещества из газообразного состояния непосредственно в твёрдое, минуя жидкую фазу. Пример: образование инея." },
            { term: "Диамагнетики", definition: "Вещества, намагничивающиеся во внешнем магнитном поле против направления поля. μ < 1. (Билет №12)" },
            { term: "Динамическое равновесие", definition: "Состояние, при котором скорость прямого процесса равна скорости обратного. (Билет №13)" },
            { term: "Диод", definition: "Нелинейный полупроводниковый элемент, пропускающий ток преимущественно в одном направлении. Виды: выпрямительный, стабилитрон, светодиод." },
            { term: "Дифференциал", definition: "Главная линейная часть приращения функции. Для функции y = f(x): dy = f'(x)dx." },
            { term: "Дифференцирование", definition: "Операция нахождения производной (или дифференциала) функции. Основные правила: производная суммы, произведения, частного, сложной функции." },
            { term: "Диэлектрики", definition: "Вещества, в которых практически отсутствуют свободные носители заряда. (Билет №9)" },
            { term: "Дополнительные цвета красок", definition: "Цвета, которые при субтрактивном смешении дают чёрный цвет. Например: голубой + жёлтый + пурпурный." },
            { term: "Дополнительные цвета лучей", definition: "Цвета, которые при аддитивном смешении дают белый свет. Например: красный + голубой; зелёный + пурпурный; синий + жёлтый." }
        ],
        "Ж": [
            { term: "Жидкое агрегатное состояние", definition: "Состояние вещества, в котором молекулы расположены близко, но могут перемещаться относительно друг друга. Жидкость сохраняет объём, но не сохраняет форму." }
        ],
        "З": [
            { term: "Закон Джоуля — Ленца", definition: "Q = I²Rt. Мощность тепловыделения P = I²R. (Билет №11)" },
            { term: "Закон Кулона", definition: "F = k|q₁q₂|/r². Сила взаимодействия двух неподвижных точечных зарядов. (Билет №9)" },
            { term: "Закон Ома для однородного участка цепи", definition: "I = U/R. (Билеты №10, №15)" },
            { term: "Закон Ома для полной цепи", definition: "I = E/(R + r). (Билет №15)" },
            { term: "Закон Ома в дифференциальной форме", definition: "j = σE, где j — плотность тока, σ — удельная проводимость, E — напряжённость электрического поля." },
            { term: "Закон преломления света", definition: "sinα/sinβ = n₂/n₁. (Билеты №2, №3, №14)" },
            { term: "Закон прямолинейного распространения света", definition: "В однородной среде свет распространяется прямолинейно. Следствие принципа Ферма. (Билеты №2, №3, №14)" },
            { term: "Закон отражения света", definition: "Угол отражения равен углу падения. (Билет №14)" },
            { term: "Закон распространения света", definition: "Свет в однородной среде распространяется прямолинейно и с постоянной скоростью v = c/n." },
            { term: "Закон сохранения электрического заряда", definition: "В замкнутой системе алгебраическая сумма зарядов сохраняется. (Билет №9)" },
            { term: "Закон Фарадея", definition: "ЭДС индукции в замкнутом контуре численно равна и противоположна по знаку скорости изменения магнитного потока: E_i = -dΦ/dt." },
            { term: "Законы параллельного соединения", definition: "U = U₁ = U₂; I = I₁ + I₂; 1/R = 1/R₁ + 1/R₂. (Билеты №5, №10, №15)" },
            { term: "Законы последовательного соединения", definition: "I = I₁ = I₂; U = U₁ + U₂; R = R₁ + R₂. (Билеты №5, №10, №15)" },
            { term: "Зеркальное отражение", definition: "Отражение от гладкой поверхности, при котором параллельный пучок остаётся параллельным. (Билет №14)" },
            { term: "Зоны видности плоского зеркала", definition: "Область пространства, из которой видно изображение источника. (Билет №14)" },
            { term: "Зрительная труба", definition: "Оптический прибор для наблюдения удалённых объектов. Бывает двух типов: труба Кеплера (перевёрнутое изображение) и труба Галилея (прямое)." }
        ],
        "И": [
            { term: "Излучение", definition: "Вид теплопередачи посредством электромагнитных волн. Не требует среды. (Билет №6)" },
            { term: "Изменение внутренней энергии", definition: "Может происходить двумя способами: совершением работы над телом (или самим телом) и теплопередачей. ΔU = Q + A_внеш." },
            { term: "Измерительный мост", definition: "Электрическая схема для точного измерения сопротивлений. Состоит из четырёх резисторов, источника и гальванометра. Баланс моста: R₁/R₂ = R₃/R₄." },

            { term: "1 дптр (диоптрия)", definition: "Единица оптической силы линзы. 1 дптр = 1 м⁻¹. Оптическая сила линзы с фокусным расстоянием 1 м." },
            { term: "1 Кл (Кулон)", definition: "Единица электрического заряда. 1 Кл = 1 А·с. Заряд, проходящий через поперечное сечение проводника за 1 с при токе 1 А." },
            { term: "1 Н/Кл (Ньютон на Кулон)", definition: "Единица напряжённости электрического поля. 1 Н/Кл = 1 В/м. Поле, действующее на заряд 1 Кл с силой 1 Н." },

    };

    const lettersOrder = ["А", "Б", "В", "Г", "Д", "Ж", "З", "И", "К", "Л", "М", "Н", "О", "П", "Р", "С", "Т", "У", "Ф", "Х", "Э"];

    const container = document.getElementById("accordionContainer");

    lettersOrder.forEach(letter => {
        const termsArray = dictionary[letter];
        if (!termsArray || termsArray.length === 0) return;

        const letterDiv = document.createElement("div");
        letterDiv.className = "letter-item";

        const header = document.createElement("div");
        header.className = "letter-header";
        header.innerHTML = `
            <div class="letter-title">
                <div class="letter-icon">${letter}</div>
                <div class="letter-name">Буква ${letter}</div>
            </div>
            <div class="arrow-icon">▶</div>
        `;

        const termsContainer = document.createElement("div");
        termsContainer.className = "terms-list";

        const grid = document.createElement("div");
        grid.className = "terms-grid";

        termsArray.forEach(termObj => {
            const btn = document.createElement("button");
            btn.className = "term-btn";
            btn.textContent = termObj.term;
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                openModal(termObj);
            });
            grid.appendChild(btn);
        });

        termsContainer.appendChild(grid);
        letterDiv.appendChild(header);
        letterDiv.appendChild(termsContainer);
        container.appendChild(letterDiv);

        let isOpen = false;
        const arrowSpan = header.querySelector(".arrow-icon");
        header.addEventListener("click", () => {
            if (isOpen) {
                termsContainer.classList.remove("show");
                arrowSpan.classList.remove("open");
            } else {
                termsContainer.classList.add("show");
                arrowSpan.classList.add("open");
            }
            isOpen = !isOpen;
        });
    });

    const modal = document.getElementById("termModal");
    const modalTitle = document.getElementById("modalTermName");
    const modalDef = document.getElementById("modalDefinition");

    function openModal(termObj) {
        modalTitle.textContent = termObj.term;
        modalDef.textContent = termObj.definition;
        modal.style.display = "flex";
    }

    document.querySelector(".modal-close").onclick = () => {
        modal.style.display = "none";
    };
    window.onclick = (e) => {
        if (e.target === modal) modal.style.display = "none";
    };
</script>
